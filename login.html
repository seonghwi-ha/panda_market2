<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓 - 로그인</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css" />

    <!-- 폰트 -->
    <link
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
      rel="stylesheet"
    />

    <script>
      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const type =
          passwordInput.getAttribute("type") === "password"
            ? "text"
            : "password";
        passwordInput.setAttribute("type", type);
      }
    </script>
  </head>
  <body>
    <div class="login-page">
      <div class="login-container">
        <!-- 상단 로고 -->
        <div class="login-top">
          <a href="/" class="logo-link">
            <div class="logo">
              <img src="./image/판다 얼굴.png" alt="Panda Logo" />
              <span>판다마켓</span>
            </div>
          </a>
        </div>

        <!-- 입력 영역 -->
        <div class="login-inner-box">
          <!-- 이메일 -->
          <div class="input-group email-group">
            <label for="email">이메일</label>
            <input
              type="email"
              id="email"
              placeholder="이메일을 입력해주세요"
            />
          </div>

          <!-- 비밀번호 -->
          <div class="input-group password-group">
            <label for="password">비밀번호</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                placeholder="비밀번호 입력"
              />
              <button
                type="button"
                class="toggle-password"
                onclick="togglePassword()"
              >
                <img src="./image/눈.png" alt="Toggle" />
              </button>
            </div>
          </div>

          <!-- 로그인 버튼 -->
          <button class="login-btn">로그인</button>

          <!-- 간편 로그인 박스 -->
          <div class="easy-login">
            <div class="easy-login-inner">
              <span>간편 로그인하기</span>
              <div class="sns-icons">
                <a href="https://www.google.com/" target="_blank">
                  <img src="./image/구글.png" alt="Google 로그인" />
                </a>
                <a href="https://www.kakao.com/" target="_blank">
                  <img src="./image/카카오.png" alt="카카오 로그인" />
                </a>
              </div>
            </div>
          </div>

          <!-- 회원가입 링크 -->
          <div class="signup-link">
            <span class="signup-text">판다마켓이 처음이신가요?</span>
            <a href="./signup.html">회원가입</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
